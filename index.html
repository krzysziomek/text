    <script>
      (() => {
        try {
          var t = localStorage.getItem("theme");
          var d = t ? t === "dark" : true;
          var r = document.documentElement;
          if (d) {
            r.classList.add("dark");
            r.style.colorScheme = "dark";
          } else {
            r.classList.remove("dark");
            r.style.colorScheme = "light";
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
