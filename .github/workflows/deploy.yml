name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Build
        env:
          # Ustaw na "/<nazwa-repo>/" jeśli wdrażasz na project page,
          # albo zostaw "/" dla user/org page (<user>.github.io).
          BASE_URL: ${{ vars.BASE_URL || '/' }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
        run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          # TanStack Start z SPA mode emituje do .output/public
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
